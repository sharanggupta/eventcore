spring:
  application:
    name: eventcore
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:eventcore}
    username: ${DB_USER:eventcore}
    password: ${DB_PASSWORD:eventcore}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

eventcore:
  webhooks:
    poll-interval: 1s
    retry-backoff: 5s
    max-attempts: 5
