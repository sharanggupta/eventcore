services:
  app:
    build: ./backend
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-eventcore}
      DB_USER: ${DB_USER:-eventcore}
      DB_PASSWORD: ${DB_PASSWORD:-eventcore}
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      RETENTION_EVENTS_MAX_AGE: ${RETENTION_EVENTS_MAX_AGE:-0}
      RETENTION_DELIVERY_HISTORY_MAX_AGE: ${RETENTION_DELIVERY_HISTORY_MAX_AGE:-0}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  db:
    # Pinned (not latest-pg16) for reproducible builds and CI; bump deliberately.
    image: timescale/timescaledb:2.27.0-pg16
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-eventcore}
      POSTGRES_USER: ${DB_USER:-eventcore}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-eventcore}
    volumes:
      - eventcore_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-eventcore} -d ${DB_NAME:-eventcore}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  eventcore_data:
